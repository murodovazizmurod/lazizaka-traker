<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazizaka</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: baseline;">
            <h1>Lazizaka</h1>
            <button class="btn" onclick="logout()" style="padding: 0.3rem 0.6rem; font-size: 0.75rem;">Выйти</button>
        </header>

        <section class="summary-cards">
            <!-- ... existing summary cards ... -->
            <div class="card main-balance">
                <h3>Общий баланс</h3>
                <div class="balance-amount" id="totalBalance">$0.00</div>
                <div class="status-indicator" id="balanceStatus">Профицит</div>
            </div>
            <div class="card-grid">
                <div class="card mini-card income">
                    <span>Доход</span>
                    <div id="totalIncome">$0.00</div>
                </div>
                <div class="card mini-card expense">
                    <span>Расход</span>
                    <div id="totalExpenses">$0.00</div>
                </div>
                <div class="card mini-card debt">
                    <span>Занял</span>
                    <div id="totalDebt">$0.00</div>
                </div>
                <div class="card mini-card loan">
                    <span>Дал в долг</span>
                    <div id="totalLoan">$0.00</div>
                </div>
            </div>
        </section>

        <section class="actions">
            <button class="btn btn-income" onclick="showModal('income')">Доход</button>
            <button class="btn btn-expense" onclick="showModal('expense')">Расход</button>
            <button class="btn" onclick="showModal('debt')">Я занял</button>
            <button class="btn" onclick="showModal('loan')">Дал в долг</button>
        </section>

        <section class="history">
            <h2>Последние транзакции</h2>
            <div class="table-container">
                <table>
                    <tbody id="transactionList">
                        <!-- Transactions will be injected here -->
                    </tbody>
                </table>
            </div>
            <div id="emptyState" class="empty-state" style="display: none;">
                Транзакций пока нет. Начните с первой!
            </div>
        </section>
    </div>

    <!-- Modal for adding/editing transactions -->
    <div id="transactionModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Добавить доход</h2>
            <form id="transactionForm">
                <input type="hidden" id="transId">
                <input type="hidden" id="transType">
                <div class="form-group">
                    <label for="amount">Сумма</label>
                    <input type="number" id="amount" placeholder="0.00" required step="0.01">
                </div>
                <div class="form-group">
                    <label for="description">Описание (куда/откуда)</label>
                    <input type="text" id="description" placeholder="напр. Зарплата, Продукты, От друга" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-text" onclick="closeModal()">Отмена</button>
                    <button type="submit" id="saveBtn" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Auth Check
        if (!localStorage.getItem('auth_token')) {
            window.location.href = '/login.html';
        }
        function logout() {
            localStorage.removeItem('auth_token');
            window.location.href = '/login.html';
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
